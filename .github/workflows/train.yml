name: CD — Retrain on New Data Version

on:
  workflow_dispatch:
  push:
    tags:
      - "data.v*"
permissions:
  contents: write
  
jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
      - name: Debug — show working directory
        run: |
          echo "Current directory:"
          pwd
          echo ""
          echo "Files in root:"
          ls -la
          echo ""
          echo "Looking for requirements.txt:"
          find . -name "requirements.txt"    

      - name: Install full dependencies
        run: pip install -r requirements.txt

      - name: Configure DVC remote
        run: |
          python -m dvc remote modify --local azure_remote connection_string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}"

      - name: Pull data from DVC remote
        run: python -m dvc pull -r azure_remote --force

      - name: Train model (5 epochs — CPU test)
        run: python src/train.py

      - name: Evaluate model
        run: python src/evaluate.py

      - name: Push model to DVC remote
        run: python -m dvc push -r azure_remote
      - name: Mark dataset as successful
        run: |
          VERSION=$(echo "${GITHUB_REF_NAME}" | sed -E 's/data\.v([0-9]+).*/\1/')
          echo $VERSION > data/LATEST_SUCCESS

          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

          git add data/LATEST_SUCCESS

          git commit -m "ci: mark retrain_v${VERSION} as successful [skip ci]" || echo "No changes"

          git push origin HEAD:main

      - name: Commit metrics
        run: |
          git config user.email "actions@github.com"
          git config user.name  "GitHub Actions"
          git add metrics/
          git diff --cached --quiet || git commit -m "ci: metrics after ${{ github.ref_name }} [skip ci]"
          git push origin HEAD:main

      - name: Print summary
        run: |
          echo "=================================="
          echo " Tag   : ${{ github.ref_name }}"
          echo " Device: CPU"
          echo " Epochs: 5"
          echo "=================================="
          cat metrics/results.json
          echo "=================================="