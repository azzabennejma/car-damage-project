name: CD — Deploy New Model

on:
  workflow_dispatch:
  repository_dispatch:
    types: [deploy_model]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure DVC remote
        run: |
          python -m dvc remote modify --local azure_remote connection_string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}"

      - name: Pull model from Azure
        run: python -m dvc pull models/model/best.pt.dvc -r azure_remote --force

      - name: Verify model exists
        run: |
          ls model || true
          echo "Model pulled successfully"

      - name: Simulated deployment
        run: |
          echo "===================================="
          echo "🚀 DEPLOYMENT STARTED"
          echo "Loading model..."
          echo "model/best.pt found ✔"
          echo "Switching production model..."
          echo "API restart simulated..."
          echo "===================================="
          echo "✅ DEPLOYMENT SUCCESSFUL"
          echo "Model is now live (simulated)"

      - name: Deployment summary
        run: |
          echo "📦 Model deployed from DVC remote"
          echo " Production model updated successfully"
          echo " Status: ACTIVE"